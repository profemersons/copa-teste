<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Operação Copa - Álbum</title>

    <link rel="stylesheet" href="album.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div id="loading">
        Carregando álbum...
    </div>

    <div id="app" style="display:none">

        <header class="header">

            <div class="player-card">

                <div class="avatar" id="playerEmoji">
                    😀
                </div>

                <div class="player-info">
                    <h2 id="playerName"></h2>
                    <p id="playerCourse"></p>
                </div>

            </div>

            <div class="album-card">

                <div class="album-logo">
                    🏆
                </div>

                <h1>OPERAÇÃO COPA</h1>

                <p class="subtitle">
                    Bastidores do Mundo Real
                </p>

                <div id="progressText">
                    0 / 0 Figurinhas
                </div>

                <div class="progress">
                    <div id="progressFill"></div>
                </div>

                <div id="progressPercent">
                    0% Completo
                </div>

            </div>

        </header>

        <section class="album-title">

            <h2>📖 Álbum de Profissões</h2>

            <p>
                Colecione profissões, complete áreas e descubra quem faz a Copa acontecer.
            </p>

        </section>

        <main id="albumContainer"></main>

    </div>

    <div id="modal" class="modal hidden">

        <div class="modal-content">

            <button id="closeModal">
                ✕
            </button>

            <div id="modalBody"></div>

        </div>

    </div>

    <nav class="bottom-nav">

        <button>
            <span>🖼</span>
            <small>Álbum</small>
        </button>

        <button onclick="goPacks()">🎁</button>

        <button>
            <span>🎯</span>
            <small>Missões</small>
        </button>

        <button>
            <span>🔄</span>
            <small>Trocas</small>
        </button>

        <button>
            <span>🏆</span>
            <small>Ranking</small>
        </button>

        <button onclick="goProfile()">👤</button>
    </nav>

    <script src="../config.js"></script>
    <script src="album.js"></script>

</body>

</html>
