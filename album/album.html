<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1">

    <title>
        Operação Copa - Álbum
    </title>

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="album.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

    <div id="loading">

        Carregando álbum...

    </div>

    <div id="app"
        style="display:none;">

        <header class="header">

            <div class="player-card">

                <div class="avatar"
                    id="playerEmoji">
                </div>

                <div class="player-info">

                    <h2 id="playerName">
                    </h2>

                    <p id="playerCourse">
                    </p>

                </div>

            </div>

            <div class="album-card">

                <div class="album-logo">
                    🏆
                </div>

                <h1>
                    OPERAÇÃO COPA
                </h1>

                <p class="subtitle">

                    Bastidores do Mundo Real

                </p>

                <div id="progressText">
                </div>

                <div class="progress">

                    <div id="progressFill">
                    </div>

                </div>

                <div id="progressPercent">
                </div>

            </div>

        </header>

        <section class="album-title">

            <h2>
                📖 Álbum de Profissões
            </h2>

            <p>

                Colecione profissões,
                complete áreas e descubra
                quem faz a Copa acontecer.

            </p>

        </section>

        <main id="albumContainer">
        </main>

    </div>

    <div id="modal"
        class="modal hidden">

        <div class="modal-content">

            <button id="closeModal">

                ✕

            </button>

            <div id="modalBody">
            </div>

        </div>

    </div>

    <nav class="bottom-nav">

        <button class="active">
            🖼
        </button>

        <button onclick="goPacks()">
            🎁
        </button>

        <button>
            🎯
        </button>

        <button onclick="goTrades()">
            🔄
        </button>

        <button>
            🏆
        </button>

        <button onclick="goProfile()">
            👤
        </button>

    </nav>

    <script src="../config.js">
    </script>

    <script src="album.js">
    </script>

</body>

</html>
