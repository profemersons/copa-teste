<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Operação Copa - Trocas</title>

    <link rel="stylesheet" href="trades.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div id="loading">
        Carregando trocas...
    </div>

    <div id="app" style="display:none">

        <header class="header">
            <h1>🔄 Trocas</h1>
            <p id="stepText">1. Escolha uma figurinha</p>
        </header>

        <!-- PASSO 1: ÁLBUM -->
        <main id="step1">
            <div id="albumContainer"></div>
        </main>

        <!-- PASSO 2: AMIGO -->
        <main id="step2" style="display:none">

            <div class="card">
                <h3>👤 Encontrar amigo</h3>
                <input id="friendCode" placeholder="Digite o código Base36">
                <button onclick="searchFriend()">Buscar amigo</button>
            </div>

            <div class="card" id="friendResult" style="display:none"></div>

            <div id="pinArea" style="display:none">

                <input id="pinInput" type="password" placeholder="Digite seu PIN">

                <button id="confirmBtn" onclick="confirmTrade()">
                    Confirmar troca
                </button>

            </div>

        </main>

    </div>

    <!-- MENU PADRÃO (CORRIGIDO) -->
    <nav class="bottom-nav">

        <button onclick="goAlbum()">🖼</button>
        <button onclick="goPacks()">🎁</button>
        <button onclick="goMissions()">🎯</button>
        <button onclick="goTrades()">🔄</button>
        <button onclick="goProfile()">👤</button>

    </nav>

    <script src="../config.js"></script>
    <script src="trades.js"></script>

</body>

</html>
